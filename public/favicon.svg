<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- White background -->
  <rect width="100" height="100" fill="#ffffff" rx="12"/>

  <!--
    Vedano "V" wingmark in dark green.
    The logo has two curved wings meeting at a sharp point at the bottom.
    Left wing curves outward to the left, right wing mirrors it.
  -->

  <!-- Left wing -->
  <path d="
    M 20 15
    C 20 15 30 15 35 15
    C 38 15 40 17 41 20
    L 50 72
    L 47 72
    L 38 22
    C 37 19 35 17 32 17
    L 22 17
    Z
  " fill="#1a3d2b"/>

  <!-- Right wing (mirror) -->
  <path d="
    M 80 15
    C 80 15 70 15 65 15
    C 62 15 60 17 59 20
    L 50 72
    L 53 72
    L 62 22
    C 63 19 65 17 68 17
    L 78 17
    Z
  " fill="#1a3d2b"/>

  <!-- Small V tip at bottom centre -->
  <polygon points="47,72 53,72 50,78" fill="#1a3d2b"/>
</svg>